name: ShippingEasy
kind: company
description: >-
  ShippingEasy is an Austin, Texas shipping software platform for online
  merchants, providing multi-carrier label printing with discounted USPS, UPS,
  FedEx, and DHL rates, automated order import and workflow rules, inventory
  and product management, branded tracking, customer email marketing, and
  reporting. ShippingEasy was acquired by Stamps.com in 2016 and is part of
  the Auctane portfolio of shipping brands, which also includes ShipStation,
  ShipEngine, ShipWorks, MetaPack, Packlink, and Endicia. The company exposes
  a public Customer API focused on sending orders into ShippingEasy from
  custom marketplaces or storefronts not already covered by the built-in
  integration catalog; for fuller multi-carrier label, rate, and tracking
  APIs, ShippingEasy directs developers to sister brand ShipEngine.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg

apis:
  - aid: shippingeasy:shippingeasy-customer-api
    name: ShippingEasy Customer API
    tags:
      - Orders
      - Stores
      - Order Management
      - Shipping
      - Ecommerce
    humanURL: https://shippingeasy.readme.io/reference/getting-started
    baseURL: https://app.shippingeasy.com/api
    properties:
      - url: https://shippingeasy.readme.io/reference/getting-started
        type: Documentation
      - url: https://shippingeasy.readme.io/reference/getting-started
        type: APIReference
      - url: https://shippingeasy.readme.io/reference/authentication-signing-requests
        type: Authentication
      - url: https://shippingeasy.readme.io/reference/rate-limits-and-throttling
        type: RateLimits
      - url: openapi/shippingeasy-customer-api-openapi.yml
        type: OpenAPI
      - url: https://github.com/ShippingEasy/shippingeasy-api-examples
        type: PostmanCollection
      - url: https://app.shippingeasy.com/settings/api_credentials
        type: Signup
      - url: api-questions@shippingeasy.com
        type: Support
    description: >-
      The ShippingEasy Customer API is an HMAC-SHA256 signed REST API that lets
      a merchant push orders into their own ShippingEasy account from a custom
      marketplace, storefront, or backoffice system that is not already covered
      by ShippingEasy's built-in integration catalog (Shopify, Amazon, eBay,
      WooCommerce, BigCommerce, Magento, Etsy, Walmart, Squarespace, etc.).
      Operations cover listing API-enabled stores, creating an order, looking
      up orders by ID, external order number, or store, updating order status,
      and cancelling an order. Credentials (API key, API secret, and per-store
      API key) are generated inside the ShippingEasy UI at Settings > Account
      Settings > API Credentials.
